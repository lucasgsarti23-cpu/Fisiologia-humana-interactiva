<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Fisiología Cardiovascular</title>

<link rel="stylesheet" href="/css/global.css">
<link rel="icon" type="image/png" href="/assets/iconos/fahce.png">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<main>

<section id="dashboard" class="card">
<h2>Dashboard fisiológico</h2>

<div class="grid">

<div class="box">
Gasto Cardíaco<br>
<strong id="gc">4.9</strong> L/min
</div>

<div class="box">
PAM<br>
<strong id="pam">93</strong> mmHg
</div>

<div class="box">
VO₂<br>
<strong id="vo2">250</strong> ml/min
</div>

<div class="box">
Estado<br>
<strong id="estado">Reposo</strong>
</div>

</div>

</section>

<section class="card">

<h2>Control hemodinámico</h2>

<label>Frecuencia Cardíaca</label>
<input id="fc" type="range" min="40" max="200" value="70" oninput="update()">

<label>Volumen Sistólico</label>
<input id="vs" type="range" min="30" max="150" value="70" oninput="update()">

<label>Resistencia Vascular</label>
<input id="rvp" type="range" min="10" max="40" value="20" oninput="update()">

<button onclick="reset()">Reset</button>

</section>

<section class="card">

<h2>Corazón funcional</h2>

<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center">

<model-viewer
id="heart"
src="/modelos/corazonhum.glb"
auto-rotate
camera-controls>
</model-viewer>

<p class="small">Modelo adaptado a carga hemodinámica</p>

</div>

</section>

<section class="card">

<h2>ECG fisiológico (P-QRS-T)</h2>
<canvas id="ecg"></canvas>

</section>

</main>

<script src="/js/layout.js"></script>

</body>
</html>
